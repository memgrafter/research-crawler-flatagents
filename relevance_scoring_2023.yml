# One-off 2023 relevance scoring configuration.
embedding:
  model: dunzhang/stella_en_400M_v5
  trust_remote_code: true
  model_kwargs:
    attn_implementation: eager
  config_kwargs:
    attn_implementation: eager
    use_memory_efficient_attention: false
    unpad_inputs: false
  normalize: true
  batch_size: 64
  query_prompt: "Instruct: Given a web search query, retrieve relevant passages that answer the query.\nQuery: "

# Minimal inline anchors; files are primary source.
anchors:
  - large language model
  - language model
  - transformer
  - retrieval augmented generation
  - agent
  - reasoning

# Use cleaned 2023 clouds as primary anchor source.
anchor_files:
  - research_paper_analysis_v2/queries/word_clouds_2023_organic_semantic_cleaned/*.txt

# LLM-pass exclusions (base + artifact cleanup v2).
anchor_exclude_files:
  - research_paper_analysis_v2/queries/word_clouds_2023_organic_semantic/llm_pass_exclusions_2023.list
  - research_paper_analysis_v2/queries/word_clouds_2023_organic_semantic/llm_pass_exclusions_2023_artifact_noise_v2.list
