spec: flatmachine
spec_version: 4.1.0
data:
  name: wrap-pipeline
  persistence:
    enabled: true
    backend: local
  settings:
    max_steps: 25
  context:
    arxiv_id: input.arxiv_id
    execution_id: input.execution_id
    paper_id: input.paper_id
    source_url: input.source_url
    title: input.title
    authors: input.authors
    abstract: input.abstract
    paper_text: input.paper_text
    reference_count: input.reference_count
    key_outcome: input.key_outcome
    corpus_signals: input.corpus_signals
    corpus_neighbors: input.corpus_neighbors
    why_hypotheses: input.why_hypotheses
    reproduction_notes: input.reproduction_notes
    open_questions: input.open_questions
    token_target_limits: 120-220
    limits_confidence: input.limits_confidence
    terminology_tags: []
    domain_tags: []
    terminology_tag_meta: {}
    report_body: input.report_body
    frontmatter: null
    formatted_report: null
    judge_decision_raw: input.judge_decision_raw
    judge_decision: input.judge_decision
    repair_attempted: input.repair_attempted
  agents:
    limits_confidence_writer: ./agents/limits_confidence_writer.flatagent.yml
    report_assembler: ./agents/report_assembler.flatagent.yml
    completeness_judge: ./agents/completeness_judge.flatagent.yml
    targeted_repair: ./agents/targeted_repair.flatagent.yml
  states:
    start:
      type: initial
      transitions:
      - condition: context.report_body != null and context.report_body != ''
        to: judge_report
      - condition: context.limits_confidence != null and context.limits_confidence != ''
        to: derive_terminology_tags
      - to: write_limits_confidence
      hooks: v2-hooks
    write_limits_confidence:
      agent: limits_confidence_writer
      execution:
        type: retry
        backoffs:
        - 12
        - 24
      input:
        title: context.title
        key_outcome: context.key_outcome
        why_hypotheses: context.why_hypotheses
        reproduction_notes: context.reproduction_notes
        corpus_signals: context.corpus_signals
        token_target: context.token_target_limits
      output_to_context:
        limits_confidence: output.content
      on_error: wrap_failed
      transitions:
      - to: derive_terminology_tags
      hooks: v2-hooks
    derive_terminology_tags:
      action: derive_terminology_tags
      transitions:
      - to: assemble_report
      hooks: v2-hooks
    assemble_report:
      agent: report_assembler
      execution:
        type: retry
        backoffs:
        - 12
        - 24
      input:
        title: context.title
        arxiv_id: context.arxiv_id
        source_url: context.source_url
        authors: context.authors
        reference_count: context.reference_count
        key_outcome: context.key_outcome
        why_hypotheses: context.why_hypotheses
        reproduction_notes: context.reproduction_notes
        open_questions: context.open_questions
        limits_confidence: context.limits_confidence
      output_to_context:
        report_body: output.content
      on_error: wrap_failed
      transitions:
      - to: judge_report
      hooks: v2-hooks
    judge_report:
      agent: completeness_judge
      execution:
        type: retry
        backoffs:
        - 12
        - 24
      input:
        report_body: context.report_body
      output_to_context:
        judge_decision_raw: output.content
      on_error: wrap_failed
      transitions:
      - to: normalize_judge_decision
      hooks: v2-hooks
    normalize_judge_decision:
      action: normalize_judge_decision
      transitions:
      - condition: context.judge_decision == 'PASS'
        to: prepend_frontmatter_v2
      - condition: context.judge_decision == 'FAIL'
        to: wrap_failed
      - condition: context.repair_attempted == true
        to: wrap_failed
      - to: targeted_repair_once
      hooks: v2-hooks
    targeted_repair_once:
      agent: targeted_repair
      execution:
        type: retry
        backoffs:
        - 12
        - 24
      input:
        report_body: context.report_body
      output_to_context:
        report_body: output.content
      on_error: wrap_failed
      transitions:
      - to: mark_repair_attempted
      hooks: v2-hooks
    mark_repair_attempted:
      action: set_repair_attempted
      transitions:
      - to: judge_report
      hooks: v2-hooks
    prepend_frontmatter_v2:
      action: prepend_frontmatter_v2
      transitions:
      - to: save_wrap_result
      hooks: v2-hooks
    save_wrap_result:
      action: save_wrap_result
      transitions:
      - to: done
      hooks: v2-hooks
    done:
      type: final
      output:
        title: context.title
        arxiv_id: context.arxiv_id
        key_outcome: context.key_outcome
        open_questions: context.open_questions
        terminology_tags: context.terminology_tags
        domain_tags: context.domain_tags
        quality_gate_decision: context.judge_decision
        formatted_report: context.formatted_report
    wrap_failed:
      action: mark_execution_failed
      transitions:
      - to: failed
      hooks: v2-hooks
    failed:
      type: final
      output:
        error: context.last_error
        arxiv_id: context.arxiv_id
        execution_id: context.execution_id
        quality_gate_decision: context.judge_decision
        report_body: context.report_body
  lifecycle_hooks: v2-hooks
metadata:
  description: 'Wrap pipeline: all cheap model calls — limits, assembly, judge, repair, frontmatter'
  tags:
  - wrap
  - cheap-model
  - assembly
