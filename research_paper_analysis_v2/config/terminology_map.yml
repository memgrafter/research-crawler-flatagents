# Terminology canonicalization map for clustering/search consistency.
# Expand over time as you review produced reports.
#
# NOTE: Broad meta-technique terms (RAG, MoE, CoT, PEFT, instruction-tuning,
# tool-use) were removed — their short aliases (rag, moe, cot, peft) caused
# false-positive matches on unrelated papers.  These terms still live in
# queries/word_clouds/ for domain_tags scoring; they just no longer pollute
# the per-paper terminology_tags in frontmatter.

transformers:
  - transformer
  - transformers

self-attention:
  - self attention
  - self-attention

