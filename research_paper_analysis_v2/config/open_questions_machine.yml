spec: flatmachine
spec_version: 4.1.0
data:
  name: open-questions
  agents:
    writer: ./agents/open_questions_writer.flatagent.yml
  context:
    title: input.title
    key_outcome: input.key_outcome
    abstract: input.abstract
    paper_text: input.paper_text
    token_target_open_questions: input.token_target_open_questions
    result: null
  states:
    start:
      type: initial
      transitions:
      - to: write
      hooks: v2-hooks
    write:
      agent: writer
      execution:
        type: retry
      input:
        title: context.title
        key_outcome: context.key_outcome
        abstract: context.abstract
        paper_text: context.paper_text
        token_target: context.token_target_open_questions
      output_to_context:
        result: output.content
      transitions:
      - to: done
      hooks: v2-hooks
    done:
      type: final
      output:
        content: context.result
  lifecycle_hooks: v2-hooks
metadata:
  description: Wrapper machine for open_questions_writer (expensive model)
