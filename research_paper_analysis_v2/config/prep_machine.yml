spec: flatmachine
spec_version: 4.1.0
data:
  name: prep-pipeline
  persistence:
    enabled: true
    backend: local
  settings:
    max_steps: 15
  context:
    arxiv_id: input.arxiv_id
    paper_id: input.paper_id
    execution_id: input.execution_id
    title: input.title
    authors: input.authors
    abstract: input.abstract
    token_target_key_outcome: 120-180
    paper_text: null
    reference_count: 0
    corpus_signals: null
    corpus_neighbors: null
    neighbors_considered: 0
    neighbors_used: 0
    key_outcome: null
  agents:
    key_outcome_writer: ./agents/key_outcome_writer.flatagent.yml
  states:
    start:
      type: initial
      transitions:
      - to: download_pdf
      hooks: v2-hooks
    download_pdf:
      action: download_pdf
      on_error: prep_failed
      transitions:
      - to: extract_text
      hooks: v2-hooks
    extract_text:
      action: extract_text
      on_error: prep_failed
      transitions:
      - to: collect_corpus_signals
      hooks: v2-hooks
    collect_corpus_signals:
      action: collect_corpus_signals
      transitions:
      - to: write_key_outcome
      hooks: v2-hooks
    write_key_outcome:
      agent: key_outcome_writer
      execution:
        type: retry
      input:
        title: context.title
        authors: context.authors
        abstract: context.abstract
        paper_text: context.paper_text
        token_target: context.token_target_key_outcome
      output_to_context:
        key_outcome: output.content
      on_error: prep_failed
      transitions:
      - to: save_prep_result
      hooks: v2-hooks
    save_prep_result:
      action: save_prep_result
      transitions:
      - to: done
      hooks: v2-hooks
    done:
      type: final
      output:
        arxiv_id: context.arxiv_id
        execution_id: context.execution_id
        key_outcome: context.key_outcome
        paper_text: context.paper_text
        reference_count: context.reference_count
        corpus_signals: context.corpus_signals
        corpus_neighbors: context.corpus_neighbors
    prep_failed:
      action: mark_execution_failed
      transitions:
      - to: failed
      hooks: v2-hooks
    failed:
      type: final
      output:
        error: context.last_error
        arxiv_id: context.arxiv_id
        execution_id: context.execution_id
  lifecycle_hooks: v2-hooks
metadata:
  description: 'Prep pipeline: download PDF, extract text, corpus signals, key outcome'
  tags:
  - prep
  - cheap-model
