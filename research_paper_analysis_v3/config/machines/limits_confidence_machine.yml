spec: flatmachine
spec_version: 4.1.0
data:
  name: limits-confidence
  agents:
    analyzer: ./analyzer.flatagent.yml
  context:
    title: input.title
    abstract: input.abstract
    paper_text: input.paper_text
    limits_confidence: null
  states:
    start:
      type: initial
      transitions:
        - to: write_limits_confidence
    write_limits_confidence:
      agent: analyzer
      execution:
        type: retry
        backoffs:
          - 12
          - 24
      on_error: section_failed
      input:
        mode: limits_confidence
        title: context.title
        abstract: context.abstract
        paper_text: context.paper_text
      output_to_context:
        limits_confidence: output.content
      transitions:
        - to: done
    section_failed:
      type: final
      output:
        content: null
        _error: context.last_error
    done:
      type: final
      output:
        content: context.limits_confidence
  lifecycle_hooks: v3-hooks
