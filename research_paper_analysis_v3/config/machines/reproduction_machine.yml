spec: flatmachine
spec_version: 4.1.0
data:
  name: reproduction
  agents:
    analyzer: ./analyzer.flatagent.yml
  context:
    title: input.title
    abstract: input.abstract
    paper_text: input.paper_text
    reference_count: input.reference_count
    reproduction: null
  states:
    start:
      type: initial
      transitions:
        - to: write_reproduction
    write_reproduction:
      agent: analyzer
      execution:
        type: retry
        backoffs:
          - 12
          - 24
      on_error: section_failed
      input:
        mode: reproduction
        title: context.title
        abstract: context.abstract
        paper_text: context.paper_text
        reference_count: context.reference_count
      output_to_context:
        reproduction: output.content
      transitions:
        - to: done
    section_failed:
      type: final
      output:
        content: null
        _error: context.last_error
    done:
      type: final
      output:
        content: context.reproduction
  lifecycle_hooks: v3-hooks
